<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Auth0 OAuth2 Test Harness - API Calls</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- highlight.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <style>
        pre { background: #f6f8fa; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="alert alert-warning" role="alert">
        <strong>Developer use only.</strong> This page makes live API calls using your current session tokens. Do not deploy this application in any non-local environment.
    </div>

    <h1 class="mb-4">API Calls</h1>

    <!-- UserInfo panel -->
    <div class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold">UserInfo Endpoint Response</span>
            <span class="badge"
                  th:classappend="${userInfoResult.statusCode() >= 200 and userInfoResult.statusCode() < 300} ? 'bg-success' : 'bg-danger'"
                  th:text="${userInfoResult.statusCode() > 0} ? 'HTTP ' + ${userInfoResult.statusCode()} : 'Error'">
            </span>
        </div>
        <div class="card-body">
            <pre><code class="json" th:text="${userInfoResult.body()}"></code></pre>
        </div>
    </div>

    <!-- Token Introspection panel (shown only when APP_INTROSPECTION_URI is set) -->
    <div class="card shadow-sm mb-4" th:if="${introspectionEnabled}">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold">Token Introspection Response</span>
            <span class="badge"
                  th:classappend="${introspectionResult != null and introspectionResult.statusCode() >= 200 and introspectionResult.statusCode() < 300} ? 'bg-success' : 'bg-danger'"
                  th:text="${introspectionResult != null and introspectionResult.statusCode() > 0} ? 'HTTP ' + ${introspectionResult.statusCode()} : 'Error'">
            </span>
        </div>
        <div class="card-body">
            <pre th:if="${introspectionResult != null}"><code class="json" th:text="${introspectionResult.body()}"></code></pre>
            <p th:unless="${introspectionResult != null}" class="text-muted">No result available.</p>
        </div>
    </div>

    <!-- Actions -->
    <div class="d-flex gap-2 mt-3">
        <a href="/home" class="btn btn-secondary">Back to Tokens</a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="btn btn-danger" type="submit">Logout</button>
        </form>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>
</body>
</html>
