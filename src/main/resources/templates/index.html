<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Steve's ForgeRock OAuth2 Test Harness</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- highlight.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
    <style>
        .token-wrap {
            word-break: break-all;
            white-space: pre-wrap;
        }
        pre { background: #f6f8fa; }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="mb-4">Steve's OAuth2 Test Harness App</h1>
                    <img th:src="@{/Designer.png}" alt="Designer Logo" class="img-fluid mb-3" style="max-width:25%;height:auto;"/>
                    <p>Click below to start the sign-in flow.</p>
                    <p>You'll get redirected to ForgeRock to authenticate.</p>
                    <p>
                        <a class="btn btn-primary" th:href="@{/oauth2/authorization/forgerock}">LOGIN</a>
                    </p>
                    <p class="text-muted mt-3">
                    The login is against <code th:text="${issuerUri}"></code>
                    </p>
                    <p class="text-muted mt-3">
                    Redirect URI should be configured in ForgeRock as
                    <code th:text="${redirectUri}"></code>.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
<script>hljs.highlightAll();</script>
<!-- Bootstrap JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
