server:
  port: 8443
  address: stevedev-local
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: password
    key-store-type: PKCS12
    key-alias: my-ssl-key

spring:
  thymeleaf:
    cache: false

  security:
    oauth2:
      client:
        registration:
          auth0:
            client-id: ${OAUTH2_CLIENT_ID}
            client-secret: ${OAUTH2_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            client-name: Auth0
            provider: auth0
            authorization-grant-type: authorization_code
            # Spring Security uses this as the redirect URI for the callback
#            redirect-uri: "https://localhost:8443/login/oauth2/code/auth0"
            redirect-uri: "https://stevedev-local:8443/login/oauth2/code/auth0"
#            redirect-uri: "https://httpbin.org/anything"
            scope:
              - openid
              - profile
              - email
              # add any API scopes you need here (e.g., read write)
        provider:
          auth0:
            # TEMP to force authentication via keycloak
            #authorization-uri: https://dev-wijb7ha3.us.auth0.com/authorize?connection=keycloak-alpha

            # Auth0 issuer URI: https://<your-tenant>.auth0.com/
            issuer-uri: ${OAUTH2_ISSUER_URI}

# Optional: If used, this needs to be defined as one of the logout URIs on ForgeRock
app:
  post-logout-redirect-uri: "https://stevedev-local:8443/"
  introspection-uri: ${APP_INTROSPECTION_URI:}

logging:
  level:
    "org.springframework.security.oauth2": DEBUG
    "org.springframework.web.client": DEBUG
    "org.springframework.http.client": DEBUG
